<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Hub</title>
  <link rel="icon" type="image/svg+xml" href="/icons/app.svg">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e4e4e7;
      --text-muted: #71717a;
      --accent: #818cf8;
      --accent-glow: rgba(129, 140, 248, 0.3);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(236, 72, 153, 0.04) 0%, transparent 50%);
      animation: bgShift 20s ease-in-out infinite alternate;
      z-index: -1;
    }

    @keyframes bgShift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-5%, -5%) rotate(3deg); }
    }

    /* Header */
    .header {
      padding: 24px 32px 16px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .logo h1 {
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(135deg, #e4e4e7, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .game-count {
      font-size: 13px;
      color: var(--text-muted);
      background: var(--surface);
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .game-count span {
      color: var(--accent);
      font-weight: 600;
    }

    /* Search */
    .search-wrap {
      position: relative;
      max-width: 480px;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 12px 16px 12px 46px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
    }

    #search::placeholder { color: var(--text-muted); }
    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background: rgba(255, 255, 255, 0.06);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      padding: 8px 32px 48px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Game card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(129, 140, 248, 0.05), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(129, 140, 248, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 40px var(--accent-glow);
    }

    .card:hover::before { opacity: 1; }

    .card-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .card-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-icon .fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: white;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      position: relative;
      z-index: 1;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-play {
      position: relative;
      z-index: 1;
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      opacity: 0;
      transform: translateY(4px);
      transition: all 0.2s;
    }

    .card:hover .card-play {
      opacity: 1;
      transform: translateY(0);
    }

    /* Empty state */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-muted);
    }

    .empty p {
      color: var(--text-muted);
      font-size: 14px;
      opacity: 0.7;
    }

    /* Loading */
    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Game player page */
    .player {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .player.active { display: flex; }
    .library.hidden { display: none; }

    .player-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
    }

    .back-btn:active {
      transform: scale(0.96);
    }

    .player-title {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
    }

    .fullscreen-btn {
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }

    .fullscreen-btn:hover {
      background: var(--surface-hover);
    }

    .game-frame {
      flex: 1;
      border: none;
      width: 100%;
      background: #000;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header { padding: 16px 16px 12px; }
      .grid { padding: 8px 16px 32px; gap: 14px; }
      .header-top { flex-direction: column; align-items: stretch; }
      .logo { justify-content: center; }
      .logo h1 { font-size: 22px; }
      .search-wrap { max-width: 100%; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      .card { padding: 16px; }
      .card-icon { width: 56px; height: 56px; }
      .card-title { font-size: 13px; }
      .card-desc { font-size: 11px; }
      .card-play { opacity: 1; transform: translateY(0); font-size: 11px; }
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .card-icon { width: 48px; height: 48px; }
      .card-title { font-size: 12px; }
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      animation: fadeInUp 0.4s ease-out backwards;
    }
  </style>
</head>
<body>

  <!-- Game library view -->
  <div id="library">
    <div class="header">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">🎮</div>
          <div>
            <h1>Game Hub</h1>
            <p>HTML Games Collection</p>
          </div>
        </div>
        <div class="search-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input type="text" id="search" placeholder="Search games..." autocomplete="off">
        </div>
        <div class="game-count"><span id="count">0</span> games</div>
      </div>
    </div>

    <div class="grid" id="grid">
      <div class="loading">
        <div class="spinner"></div>
        <p style="color: var(--text-muted); font-size: 14px;">Loading games...</p>
      </div>
    </div>
  </div>

  <!-- Game player view -->
  <div class="player" id="player">
    <div class="player-bar">
      <button class="back-btn" onclick="closeGame()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back
      </button>
      <span class="player-title" id="playerTitle"></span>
      <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Fullscreen">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
      </button>
    </div>
    <iframe class="game-frame" id="gameFrame" allowfullscreen allow="autoplay; fullscreen; gamepad"></iframe>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const searchInput = document.getElementById('search');
    const countEl = document.getElementById('count');
    const library = document.getElementById('library');
    const player = document.getElementById('player');
    const gameFrame = document.getElementById('gameFrame');
    const playerTitle = document.getElementById('playerTitle');

    let allGames = [];

    // Color palette for fallback icons
    const gradients = [
      'linear-gradient(135deg, #6366f1, #8b5cf6)',
      'linear-gradient(135deg, #ec4899, #f43f5e)',
      'linear-gradient(135deg, #14b8a6, #06b6d4)',
      'linear-gradient(135deg, #f59e0b, #ef4444)',
      'linear-gradient(135deg, #22c55e, #10b981)',
      'linear-gradient(135deg, #3b82f6, #6366f1)',
      'linear-gradient(135deg, #f97316, #eab308)',
      'linear-gradient(135deg, #8b5cf6, #d946ef)',
    ];

    function getGradient(title) {
      let hash = 0;
      for (let i = 0; i < title.length; i++) hash = title.charCodeAt(i) + ((hash << 5) - hash);
      return gradients[Math.abs(hash) % gradients.length];
    }

    function renderGames(games) {
      countEl.textContent = games.length;

      if (games.length === 0) {
        grid.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🕹️</div>
            <h2>No games found</h2>
            <p>Place HTML files in the games folder to get started.</p>
          </div>`;
        return;
      }

      grid.innerHTML = games.map((game, i) => {
        const letter = game.title.charAt(0).toUpperCase();
        const grad = getGradient(game.title);
        const iconSrc = game.favicon || `/icons/${encodeURIComponent(game.path)}`;
        const iconError = `this.onerror=null;this.src='/icons/${encodeURIComponent(game.path)}';`;

        return `
          <div class="card" onclick="openGame('${encodeURIComponent(game.path)}', '${game.title.replace(/'/g, "\\'")}')" style="animation-delay: ${i * 0.05}s">
            <div class="card-icon">
              <img src="${iconSrc}" alt="${game.title}" ${iconError} loading="lazy">
            </div>
            <div class="card-title">${game.title}</div>
            <div class="card-desc">${game.description}</div>
            <div class="card-play">▶ Play</div>
          </div>`;
      }).join('');
    }

    async function loadGames() {
      try {
        const res = await fetch('/api/games');
        allGames = await res.json();
        renderGames(allGames);
      } catch (e) {
        grid.innerHTML = `
          <div class="empty">
            <div class="empty-icon">⚠️</div>
            <h2>Failed to load games</h2>
            <p>Make sure the server is running.</p>
          </div>`;
      }
    }

    searchInput.addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase().trim();
      if (!q) {
        renderGames(allGames);
        return;
      }
      const filtered = allGames.filter(g =>
        g.title.toLowerCase().includes(q) ||
        g.description.toLowerCase().includes(q)
      );
      renderGames(filtered);
    });

    function openGame(path, title) {
      library.classList.add('hidden');
      player.classList.add('active');
      playerTitle.textContent = title;
      gameFrame.src = `/games/${path}`;
    }

    function closeGame() {
      player.classList.remove('active');
      library.classList.remove('hidden');
      gameFrame.src = '';
    }

    function toggleFullscreen() {
      const frame = document.getElementById('gameFrame');
      if (!document.fullscreenElement) {
        (frame.requestFullscreen || frame.webkitRequestFullscreen).call(frame);
      } else {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
      }
    }

    // Load on start
    loadGames();
  </script>
</body>
</html>
