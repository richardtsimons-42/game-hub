<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIGGER</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  color: #fff;
}
#gameContainer {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#hud {
  display: flex;
  justify-content: space-between;
  width: 640px;
  padding: 8px 0;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.hud-item { display: flex; align-items: center; gap: 8px; }
.hud-label { color: #888; font-size: 12px; }
.hud-value { color: #0ff; font-size: 18px; font-weight: bold; }
#weaponBar {
  width: 80px; height: 8px;
  background: #333; border: 1px solid #555;
  border-radius: 4px; overflow: hidden;
}
#weaponFill {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, #f00, #ff0, #0f0);
  transition: width 0.1s;
}
canvas {
  border: 2px solid #333;
  image-rendering: pixelated;
  border-radius: 4px;
  box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
}
#overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.88);
  z-index: 10;
  pointer-events: auto;
}
#overlay.hidden { display: none; pointer-events: none; }
#overlay h1 {
  font-size: 52px;
  color: #0ff;
  text-shadow: 0 0 20px #0ff, 0 0 40px #08f;
  margin-bottom: 10px;
  letter-spacing: 8px;
}
#overlay h2 {
  font-size: 28px;
  color: #ff0;
  text-shadow: 0 0 10px #ff0;
  margin-bottom: 20px;
}
#overlay .subtitle {
  color: #aaa;
  font-size: 14px;
  margin-bottom: 30px;
  text-align: center;
  line-height: 1.8;
}
#overlay .controls {
  color: #888;
  font-size: 12px;
  margin-top: 20px;
  text-align: center;
  line-height: 2;
}
#overlay .controls span { color: #0ff; }
.btn {
  background: linear-gradient(180deg, #0cf, #08a);
  color: #fff;
  border: none;
  padding: 12px 40px;
  font-size: 18px;
  font-family: 'Courier New', monospace;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 3px;
  cursor: pointer;
  border-radius: 4px;
  margin: 8px;
  transition: all 0.2s;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
.btn:hover {
  background: linear-gradient(180deg, #0ef, #09b);
  box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
  transform: scale(1.05);
}
#levelAnnounce {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 42px;
  color: #0ff;
  text-shadow: 0 0 20px #0ff, 0 0 40px #08f;
  z-index: 5;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  letter-spacing: 6px;
}
#levelAnnounce.show {
  opacity: 1;
  animation: levelPulse 2s ease-in-out;
}
@keyframes levelPulse {
  0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
  20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
}
.score-popup {
  position: absolute;
  color: #ff0;
  font-size: 16px;
  font-weight: bold;
  pointer-events: none;
  z-index: 6;
  animation: scoreFloat 1s ease-out forwards;
  text-shadow: 0 0 5px #ff0;
}
@keyframes scoreFloat {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-40px); }
}
</style>
</head>
<body>
<div id="gameContainer">
  <div id="hud">
    <div class="hud-item">
      <div><div class="hud-label">Score</div><div class="hud-value" id="scoreVal">0</div></div>
    </div>
    <div class="hud-item">
      <div><div class="hud-label">Level</div><div class="hud-value" id="levelVal">1</div></div>
    </div>
    <div class="hud-item">
      <div><div class="hud-label">Lives</div><div class="hud-value" id="livesVal">3</div></div>
    </div>
    <div class="hud-item">
      <div><div class="hud-label">Weapon</div>
        <div id="weaponBar"><div id="weaponFill"></div></div>
      </div>
    </div>
  </div>
  <canvas id="gameCanvas" width="640" height="480"></canvas>
  <div id="levelAnnounce"></div>
  <div id="overlay">
    <h1>DIGGER</h1>
    <div class="subtitle">
      Dig tunnels. Collect emeralds &amp; gold.<br>
      Avoid the monsters. Use your weapon wisely.
    </div>
    <button class="btn" id="startBtn">START GAME</button>
    <div class="controls">
      <span>Arrow Keys</span> — Move &amp; Dig<br>
      <span>Space</span> — Fire Weapon<br>
      <span>P</span> — Pause &nbsp; <span>ESC</span> — Quit
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const CELL = 32;
  const COLS = 20;
  const ROWS = 15;
  const W = canvas.width;
  const H = canvas.height;

  // ---- AUDIO ENGINE ----
  let audioCtx;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const g = audioCtx.createGain();
    g.connect(audioCtx.destination);

    try {
      switch(type) {
        case 'dig': {
          const o = audioCtx.createOscillator();
          o.type = 'square';
          o.frequency.setValueAtTime(200, now);
          o.frequency.exponentialRampToValueAtTime(80, now + 0.08);
          g.gain.setValueAtTime(0.12, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
          o.connect(g);
          o.start(now);
          o.stop(now + 0.08);
          break;
        }
        case 'collect': {
          const o = audioCtx.createOscillator();
          o.type = 'sine';
          o.frequency.setValueAtTime(600, now);
          o.frequency.exponentialRampToValueAtTime(1200, now + 0.12);
          g.gain.setValueAtTime(0.15, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
          o.connect(g);
          o.start(now);
          o.stop(now + 0.15);
          break;
        }
        case 'emerald': {
          const o = audioCtx.createOscillator();
          o.type = 'sine';
          o.frequency.setValueAtTime(800, now);
          o.frequency.exponentialRampToValueAtTime(1600, now + 0.15);
          g.gain.setValueAtTime(0.15, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
          o.connect(g);
          o.start(now);
          o.stop(now + 0.2);
          const g2 = audioCtx.createGain();
          g2.connect(audioCtx.destination);
          const o2 = audioCtx.createOscillator();
          o2.type = 'sine';
          o2.frequency.setValueAtTime(1200, now + 0.08);
          o2.frequency.exponentialRampToValueAtTime(2000, now + 0.2);
          g2.gain.setValueAtTime(0.1, now + 0.08);
          g2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
          o2.connect(g2);
          o2.start(now + 0.08);
          o2.stop(now + 0.25);
          break;
        }
        case 'kill': {
          const o = audioCtx.createOscillator();
          o.type = 'sawtooth';
          o.frequency.setValueAtTime(400, now);
          o.frequency.exponentialRampToValueAtTime(100, now + 0.3);
          g.gain.setValueAtTime(0.15, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
          o.connect(g);
          o.start(now);
          o.stop(now + 0.3);
          break;
        }
        case 'die': {
          const o = audioCtx.createOscillator();
          o.type = 'sawtooth';
          o.frequency.setValueAtTime(300, now);
          o.frequency.exponentialRampToValueAtTime(50, now + 0.6);
          g.gain.setValueAtTime(0.2, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
          o.connect(g);
          o.start(now);
          o.stop(now + 0.6);
          break;
        }
        case 'fire': {
          const o = audioCtx.createOscillator();
          o.type = 'square';
          o.frequency.setValueAtTime(800, now);
          o.frequency.exponentialRampToValueAtTime(200, now + 0.15);
          g.gain.setValueAtTime(0.12, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
          o.connect(g);
          o.start(now);
          o.stop(now + 0.15);
          break;
        }
        case 'levelup': {
          [0, 0.1, 0.2, 0.3].forEach((delay, i) => {
            const og = audioCtx.createGain();
            og.connect(audioCtx.destination);
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime([523, 659, 784, 1047][i], now + delay);
            og.gain.setValueAtTime(0.12, now + delay);
            og.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.15);
            osc.connect(og);
            osc.start(now + delay);
            osc.stop(now + delay + 0.15);
          });
          break;
        }
        case 'bagdrop': {
          const o = audioCtx.createOscillator();
          o.type = 'triangle';
          o.frequency.setValueAtTime(150, now);
          o.frequency.exponentialRampToValueAtTime(80, now + 0.2);
          g.gain.setValueAtTime(0.1, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
          o.connect(g);
          o.start(now);
          o.stop(now + 0.2);
          break;
        }
        case 'wobble': {
          const o = audioCtx.createOscillator();
          o.type = 'square';
          o.frequency.setValueAtTime(300 + Math.random() * 100, now);
          g.gain.setValueAtTime(0.06, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
          o.connect(g);
          o.start(now);
          o.stop(now + 0.05);
          break;
        }
      }
    } catch(e) {
      // Silently ignore audio errors
    }
  }

  // ---- GAME STATE ----
  let grid, player, monsters, bullets, emeralds, goldPieces;
  let score, lives, level, gameState;
  let weaponReady, weaponTimer;
  let particles = [];
  let bagDrops = [];
  let frameCount = 0;
  let levelTimer = 0;
  let keys = {};
  let animFrameId = null;

  // ---- GRID ----
  function createGrid() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      grid[r] = [];
      for (let c = 0; c < COLS; c++) {
        if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) {
          grid[r][c] = 2; // WALL
        } else {
          grid[r][c] = 0; // EARTH
        }
      }
    }
    // Pre-dug horizontal tunnel in the middle
    const midRow = Math.floor(ROWS / 2);
    for (let c = 2; c < COLS - 2; c++) {
      grid[midRow][c] = 1; // TUNNEL
    }
    // Pre-dug vertical tunnel
    const midCol = Math.floor(COLS / 2);
    for (let r = 2; r < ROWS - 2; r++) {
      grid[r][midCol] = 1; // TUNNEL
    }
  }

  // ---- PLAYER ----
  function createPlayer() {
    const midRow = Math.floor(ROWS / 2);
    const midCol = Math.floor(COLS / 2);
    return {
      x: midCol * CELL + CELL / 2,
      y: midRow * CELL + CELL / 2,
      dir: 0,
      speed: 2,
      invincible: 0
    };
  }

  // ---- MONSTERS ----
  function createMonsters() {
    monsters = [];
    const count = Math.min(2 + Math.floor(level * 0.8), 8);
    for (let i = 0; i < count; i++) {
      spawnMonster();
    }
  }

  function spawnMonster() {
    const sx = (COLS - 3) * CELL + CELL / 2;
    const sy = CELL + CELL / 2;
    const type = (level >= 3 && Math.random() < 0.3 + level * 0.05) ? 'gobby' : 'nobbin';
    monsters.push({
      x: sx, y: sy,
      type: type,
      speed: type === 'gobby' ? 1.2 + level * 0.1 : 0.8 + level * 0.08,
      dir: Math.floor(Math.random() * 4),
      alive: true,
      squashAnim: 0
    });
  }

  // ---- COLLECTIBLES ----
  function createCollectibles() {
    emeralds = [];
    goldPieces = [];

    // Emerald clusters
    const clusterCount = 3 + Math.floor(level / 2);
    for (let i = 0; i < clusterCount; i++) {
      const cx = 2 + Math.floor(Math.random() * (COLS - 4));
      const cy = 2 + Math.floor(Math.random() * (ROWS - 4));
      const count = 2 + Math.floor(Math.random() * 3);
      for (let j = 0; j < count; j++) {
        const ex = cx + Math.floor(Math.random() * 3) - 1;
        const ey = cy + Math.floor(Math.random() * 3) - 1;
        if (ex > 0 && ex < COLS - 1 && ey > 0 && ey < ROWS - 1) {
          emeralds.push({
            x: ex * CELL + CELL / 2,
            y: ey * CELL + CELL / 2,
            collected: false,
            value: 100
          });
        }
      }
    }

    // Gold bags
    const bagCount = 4 + Math.floor(level / 3);
    for (let i = 0; i < bagCount; i++) {
      let bx, by;
      do {
        bx = 2 + Math.floor(Math.random() * (COLS - 4));
        by = 2 + Math.floor(Math.random() * (ROWS - 4));
      } while (grid[by][bx] !== 0);
      goldPieces.push({
        x: bx * CELL + CELL / 2,
        y: by * CELL + CELL / 2,
        gridCol: bx,
        gridRow: by,
        collected: false,
        wobbling: false,
        wobbleTimer: 0,
        dropped: false,
        falling: false,
        fallY: 0,
        value: 25
      });
    }
  }

  // ---- BULLETS ----
  function fireBullet() {
    if (!weaponReady) return;
    weaponReady = false;
    weaponTimer = 5 + level;
    playSound('fire');

    const dirs = [[1,0],[0,1],[-1,0],[0,-1]];
    const [dx, dy] = dirs[player.dir];
    bullets.push({
      x: player.x,
      y: player.y,
      dx: dx * 5,
      dy: dy * 5,
      life: 60
    });
  }

  // ---- PARTICLES ----
  function addParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        life: 20 + Math.random() * 20,
        color: color,
        size: 2 + Math.random() * 3
      });
    }
  }

  function showScorePopup(x, y, text) {
    try {
      const popup = document.createElement('div');
      popup.className = 'score-popup';
      popup.textContent = text;
      popup.style.left = x + 'px';
      popup.style.top = y + 'px';
      document.getElementById('gameContainer').appendChild(popup);
      setTimeout(function() { popup.remove(); }, 1000);
    } catch(e) {
      // Ignore DOM errors
    }
  }

  // ---- INIT LEVEL ----
  function initLevel() {
    try {
      createGrid();
      player = createPlayer();
      weaponReady = true;
      weaponTimer = 0;
      bullets = [];
      particles = [];
      bagDrops = [];
      createMonsters();
      createCollectibles();
      gameState = 'levelup';
      levelTimer = 120;

      var announce = document.getElementById('levelAnnounce');
      if (announce) {
        announce.textContent = 'LEVEL ' + level;
        announce.className = 'show';
        setTimeout(function() {
          if (announce) announce.className = '';
        }, 2000);
      }
    } catch(e) {
      console.error('initLevel error:', e);
    }
  }

  // ---- DRAWING ----
  function drawEarth(x, y) {
    var px = x * CELL;
    var py = y * CELL;
    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(px, py, CELL, CELL);
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(px + 2, py + 2, CELL - 4, CELL - 4);
    ctx.fillStyle = '#4a3a2a';
    var seed = (x * 31 + y * 17) % 7;
    for (var i = 0; i < 3; i++) {
      var sx = px + 4 + ((seed * 7 + i * 11) % (CELL - 8));
      var sy = py + 4 + ((seed * 13 + i * 17) % (CELL - 8));
      ctx.fillRect(sx, sy, 2, 2);
    }
  }

  function drawTunnel(x, y) {
    var px = x * CELL;
    var py = y * CELL;
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(px, py, CELL, CELL);
    ctx.strokeStyle = '#1a3a2a';
    ctx.lineWidth = 1;
    ctx.strokeRect(px + 1, py + 1, CELL - 2, CELL - 2);
  }

  function drawWall(x, y) {
    var px = x * CELL;
    var py = y * CELL;
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(px, py, CELL, CELL);
    ctx.strokeStyle = '#2a2a4a';
    ctx.lineWidth = 1;
    ctx.strokeRect(px, py, CELL, CELL);
  }

  function drawPlayer() {
    var px = player.x;
    var py = player.y;
    var r = CELL / 2 - 2;

    if (player.invincible > 0 && Math.floor(frameCount / 4) % 2 === 0) return;

    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(player.dir * Math.PI / 2);

    var grad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
    grad.addColorStop(0, '#ff6');
    grad.addColorStop(1, '#fa0');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();

    // Mouth
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.moveTo(r - 2, -4);
    ctx.lineTo(r + 4, 0);
    ctx.lineTo(r - 2, 4);
    ctx.closePath();
    ctx.fill();

    // Eye
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-3, -5, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-2, -6, 1.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Glow
    ctx.shadowColor = '#fa0';
    ctx.shadowBlur = 10;
    ctx.fillStyle = 'rgba(255,170,0,0.1)';
    ctx.beginPath();
    ctx.arc(px, py, r + 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawMonster(m) {
    var px = m.x;
    var py = m.y;
    var r = CELL / 2 - 3;

    if (!m.alive) {
      if (m.squashAnim > 0) {
        var scale = 1 - m.squashAnim / 30;
        ctx.fillStyle = m.type === 'gobby' ? '#f0f' : '#f44';
        ctx.beginPath();
        ctx.ellipse(px, py + r * (1 - scale), r * (1 + scale * 0.5), r * scale * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
        m.squashAnim--;
      }
      return;
    }

    ctx.save();
    ctx.translate(px, py);

    if (m.type === 'nobbin') {
      var bob = Math.sin(frameCount * 0.1) * 2;

      var grad = ctx.createRadialGradient(0, bob, 0, 0, bob, r);
      grad.addColorStop(0, '#f88');
      grad.addColorStop(1, '#c44');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, bob, r, 0, Math.PI * 2);
      ctx.fill();

      // Spikes
      ctx.fillStyle = '#f66';
      for (var i = 0; i < 6; i++) {
        var angle = (i / 6) * Math.PI * 2 + frameCount * 0.02;
        var sx = Math.cos(angle) * (r - 2);
        var sy = bob + Math.sin(angle) * (r - 2);
        ctx.beginPath();
        ctx.arc(sx, sy, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-4, bob - 2, 4, 0, Math.PI * 2);
      ctx.arc(4, bob - 2, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(-3, bob - 2, 2, 0, Math.PI * 2);
      ctx.arc(5, bob - 2, 2, 0, Math.PI * 2);
      ctx.fill();

    } else {
      // Gobby
      var bob = Math.sin(frameCount * 0.08) * 3;
      var largerR = r + 3;

      var grad = ctx.createRadialGradient(0, bob, 0, 0, bob, largerR);
      grad.addColorStop(0, '#d6f');
      grad.addColorStop(1, '#808');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, bob, largerR, 0, Math.PI * 2);
      ctx.fill();

      // Angry eyes
      ctx.fillStyle = '#ff0';
      ctx.beginPath();
      ctx.arc(-5, bob - 3, 5, 0, Math.PI * 2);
      ctx.arc(5, bob - 3, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f00';
      ctx.beginPath();
      ctx.arc(-4, bob - 3, 2.5, 0, Math.PI * 2);
      ctx.arc(6, bob - 3, 2.5, 0, Math.PI * 2);
      ctx.fill();

      // Eyebrows
      ctx.strokeStyle = '#606';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-9, bob - 9);
      ctx.lineTo(-1, bob - 6);
      ctx.moveTo(9, bob - 9);
      ctx.lineTo(1, bob - 6);
      ctx.stroke();

      // Mouth
      ctx.fillStyle = '#404';
      ctx.beginPath();
      ctx.arc(0, bob + 5, 4, 0, Math.PI);
      ctx.fill();
      ctx.fillStyle = '#fff';
      for (var i = -2; i <= 2; i++) {
        ctx.fillRect(i * 2 - 0.5, bob + 5, 1, 2);
      }
    }

    ctx.restore();
  }

  function drawEmerald(e) {
    if (e.collected) return;
    var px = e.x;
    var py = e.y;
    var pulse = 1 + Math.sin(frameCount * 0.08) * 0.1;
    var s = (CELL / 2 - 4) * pulse;

    ctx.shadowColor = '#0f0';
    ctx.shadowBlur = 8;

    ctx.fillStyle = '#0c0';
    ctx.beginPath();
    ctx.moveTo(px, py - s);
    ctx.lineTo(px + s * 0.7, py);
    ctx.lineTo(px, py + s);
    ctx.lineTo(px - s * 0.7, py);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#4f4';
    ctx.beginPath();
    ctx.moveTo(px, py - s * 0.6);
    ctx.lineTo(px + s * 0.3, py);
    ctx.lineTo(px, py + s * 0.2);
    ctx.lineTo(px - s * 0.3, py);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.fillRect(px - 1, py - s * 0.5, 2, 2);
  }

  function drawGoldBag(g) {
    if (g.collected) return;
    var px = g.x;
    var py = g.y + g.fallY;

    if (g.wobbling) {
      var wobble = Math.sin(frameCount * 0.3) * 3;
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(wobble * Math.PI / 180);
      ctx.translate(-px, -py);
    }

    var s = CELL / 2 - 4;
    ctx.fillStyle = '#a60';
    ctx.beginPath();
    ctx.moveTo(px - s, py + s * 0.3);
    ctx.quadraticCurveTo(px - s * 0.8, py - s, px, py - s * 0.7);
    ctx.quadraticCurveTo(px + s * 0.8, py - s, px + s, py + s * 0.3);
    ctx.lineTo(px + s, py + s * 0.8);
    ctx.quadraticCurveTo(px, py + s, px - s, py + s * 0.8);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', px, py + 2);

    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.arc(px - 3, py - 3, 3, 0, Math.PI * 2);
    ctx.fill();

    if (g.wobbling) {
      ctx.restore();
    }
  }

  function drawGoldPiece(gp) {
    if (gp.collected) return;
    var px = gp.x;
    var py = gp.y + gp.fallY;
    var s = 6;

    ctx.fillStyle = '#ff0';
    ctx.beginPath();
    ctx.arc(px, py, s, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#fa0';
    ctx.beginPath();
    ctx.arc(px - 1, py - 1, s * 0.6, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 8px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', px, py + 1);
  }

  function drawBullet(b) {
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(0,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(b.x - b.dx, b.y - b.dy, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawParticles() {
    particles.forEach(function(p) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life / 40;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    });
    ctx.globalAlpha = 1;
  }

  // ---- UPDATE ----
  function digInDirection() {
    var dirs = [[1,0],[0,1],[-1,0],[0,-1]];
    var d = dirs[player.dir];
    var col = Math.floor(player.x / CELL) + d[0];
    var row = Math.floor(player.y / CELL) + d[1];

    if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;
    if (grid[row][col] === 0) {
      grid[row][col] = 1;
      playSound('dig');
      addParticles(col * CELL + CELL / 2, row * CELL + CELL / 2, '#5a3a1a', 5);

      // Check gold bags above
      for (var r = row - 1; r >= 0; r--) {
        if (grid[r][col] === 2) break;
        for (var i = 0; i < goldPieces.length; i++) {
          var g = goldPieces[i];
          if (g.gridCol === col && g.gridRow === r && !g.collected && !g.dropped) {
            g.wobbling = true;
            g.wobbleTimer = 90;
          }
        }
      }
    }
  }

  function movePlayer() {
    if (player.invincible > 0) {
      player.invincible--;
      return;
    }

    var dx = 0, dy = 0;
    switch (player.dir) {
      case 0: dx = 1; break;
      case 1: dy = 1; break;
      case 2: dx = -1; break;
      case 3: dy = -1; break;
    }

    var newX = player.x + dx * player.speed;
    var newY = player.y + dy * player.speed;

    if (newX < CELL / 2) player.x = W - CELL / 2;
    else if (newX > W - CELL / 2) player.x = CELL / 2;
    else player.x = newX;

    if (newY < CELL / 2) player.y = CELL / 2;
    else if (newY > H - CELL / 2) player.y = H - CELL / 2;
    else player.y = newY;

    // Check if on tunnel
    var col = Math.floor(player.x / CELL);
    var row = Math.floor(player.y / CELL);
    if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
      if (grid[row][col] === 0) {
        // Find nearest tunnel
        var bestDist = Infinity;
        var bestX = player.x, bestY = player.y;
        for (var r = 0; r < ROWS; r++) {
          for (var c = 0; c < COLS; c++) {
            if (grid[r][c] === 1) {
              var dist = Math.abs(c * CELL + CELL / 2 - player.x) + Math.abs(r * CELL + CELL / 2 - player.y);
              if (dist < bestDist) {
                bestDist = dist;
                bestX = c * CELL + CELL / 2;
                bestY = r * CELL + CELL / 2;
              }
            }
          }
        }
        player.x = bestX;
        player.y = bestY;
      }
    }
  }

  function updateMonsters() {
    var dirs = [[1,0],[0,1],[-1,0],[0,-1]];
    monsters.forEach(function(m) {
      if (!m.alive) return;

      // Clamp direction to valid range
      if (m.dir < 0) m.dir = 0;
      if (m.dir > 3) m.dir = 3;

      var d = dirs[m.dir];
      var newX = m.x + d[0] * m.speed;
      var newY = m.y + d[1] * m.speed;

      var col = Math.floor(newX / CELL);
      var row = Math.floor(newY / CELL);

      if (row < 1 || row >= ROWS - 1 || col < 1 || col >= COLS - 1 || grid[row][col] !== 1) {
        // Pick new direction
        if (m.type === 'gobby' && Math.random() < 0.4) {
          var pdx = player.x - m.x;
          var pdy = player.y - m.y;
          if (Math.abs(pdx) > Math.abs(pdy)) {
            m.dir = pdx > 0 ? 0 : 2;
          } else {
            m.dir = pdy > 0 ? 1 : 3;
          }
        } else {
          m.dir = Math.floor(Math.random() * 4);
        }
      } else {
        m.x = newX;
        m.y = newY;
      }

      // Wrap
      if (m.x < CELL / 2) m.x = W - CELL / 2;
      if (m.x > W - CELL / 2) m.x = CELL / 2;
    });
  }

  function updateBullets() {
    for (var i = bullets.length - 1; i >= 0; i--) {
      var b = bullets[i];
      b.x += b.dx;
      b.y += b.dy;
      b.life--;

      var col = Math.floor(b.x / CELL);
      var row = Math.floor(b.y / CELL);
      if (row < 0 || row >= ROWS || col < 0 || col >= COLS || grid[row][col] === 2) {
        addParticles(b.x, b.y, '#0ff', 3);
        bullets.splice(i, 1);
        continue;
      }

      var hit = false;
      for (var j = 0; j < monsters.length; j++) {
        var m = monsters[j];
        if (!m.alive) continue;
        var dist = Math.hypot(b.x - m.x, b.y - m.y);
        if (dist < CELL / 2) {
          m.alive = false;
          m.squashAnim = 30;
          score += m.type === 'gobby' ? 200 : 100;
          addParticles(m.x, m.y, m.type === 'gobby' ? '#d6f' : '#f88', 10);
          playSound('kill');
          showScorePopup(b.x, b.y, (m.type === 'gobby' ? '+200' : '+100'));
          hit = true;
          break;
        }
      }
      if (hit || b.life <= 0) {
        bullets.splice(i, 1);
      }
    }
  }

  function updateEmeralds() {
    for (var i = 0; i < emeralds.length; i++) {
      var e = emeralds[i];
      if (e.collected) continue;
      var dist = Math.hypot(player.x - e.x, player.y - e.y);
      if (dist < CELL / 2) {
        e.collected = true;
        score += e.value;
        addParticles(e.x, e.y, '#0f0', 8);
        playSound('emerald');
        showScorePopup(e.x, e.y, '+' + e.value);
      }
    }
  }

  function updateGoldPieces() {
    for (var i = 0; i < goldPieces.length; i++) {
      var g = goldPieces[i];
      if (g.collected) continue;

      if (g.wobbling) {
        g.wobbleTimer--;
        if (g.wobbleTimer <= 0 && !g.dropped) {
          g.dropped = true;
          g.falling = true;
          g.fallY = 0;
          playSound('bagdrop');
        }
      }

      if (g.falling) {
        g.fallY += 2;
        var targetRow = g.gridRow * CELL + CELL / 2;

        if (g.y + g.fallY >= targetRow) {
          g.fallY = targetRow - g.y;
          g.falling = false;

          var hitMonster = false;
          for (var j = 0; j < monsters.length; j++) {
            var m = monsters[j];
            if (!m.alive) continue;
            if (Math.hypot(m.x - g.x, m.y - (g.y + g.fallY)) < CELL / 2) {
              m.alive = false;
              m.squashAnim = 30;
              score += m.type === 'gobby' ? 200 : 100;
              addParticles(m.x, m.y, '#ff0', 10);
              playSound('kill');
              hitMonster = true;
              break;
            }
          }

          if (!hitMonster) {
            g.collected = true;
            var pieceCount = 3 + Math.floor(Math.random() * 3);
            for (var k = 0; k < pieceCount; k++) {
              goldPieces.push({
                x: g.x + (Math.random() - 0.5) * 20,
                y: g.y + g.fallY + (Math.random() - 0.5) * 10,
                collected: false,
                wobbling: false,
                dropped: false,
                falling: false,
                fallY: 0,
                value: 25
              });
            }
            addParticles(g.x, g.y + g.fallY, '#ff0', 6);
            playSound('bagdrop');
          }
        }
      }

      // Collect loose gold
      for (var j = 0; j < goldPieces.length; j++) {
        var gp = goldPieces[j];
        if (gp.collected || gp.wobbling || gp.falling) continue;
        var dist = Math.hypot(player.x - gp.x, player.y - gp.y);
        if (dist < CELL / 2) {
          gp.collected = true;
          score += gp.value;
          addParticles(gp.x, gp.y, '#ff0', 5);
          playSound('collect');
          showScorePopup(gp.x, gp.y, '+' + gp.value);
        }
      }
    }
  }

  function updateMonstersCollision() {
    if (player.invincible > 0) return;

    for (var i = 0; i < monsters.length; i++) {
      var m = monsters[i];
      if (!m.alive) continue;
      var dist = Math.hypot(player.x - m.x, player.y - m.y);
      if (dist < CELL * 0.7) {
        lives--;
        playSound('die');
        addParticles(player.x, player.y, '#fa0', 15);

        if (lives <= 0) {
          gameState = 'gameover';
          showOverlay('gameover');
        } else {
          player.invincible = 120;
          var midRow = Math.floor(ROWS / 2);
          var midCol = Math.floor(COLS / 2);
          player.x = midCol * CELL + CELL / 2;
          player.y = midRow * CELL + CELL / 2;
        }
        return;
      }
    }
  }

  function updateParticles() {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function updateWeapon() {
    if (!weaponReady) {
      weaponTimer -= 1 / 60;
      if (weaponTimer <= 0) {
        weaponReady = true;
        weaponTimer = 0;
      }
    }
    var fill = document.getElementById('weaponFill');
    if (fill) {
      fill.style.width = weaponReady ? '100%' : Math.max(0, (1 - weaponTimer / (5 + level)) * 100) + '%';
    }
  }

  function checkLevelComplete() {
    var allCollected = true;
    for (var i = 0; i < emeralds.length; i++) {
      if (!emeralds[i].collected) { allCollected = false; break; }
    }
    if (allCollected) {
      level++;
      initLevel();
      playSound('levelup');
    }
  }

  function update() {
    if (gameState !== 'playing') return;

    frameCount++;

    if (keys['ArrowUp']) player.dir = 3;
    if (keys['ArrowDown']) player.dir = 1;
    if (keys['ArrowLeft']) player.dir = 2;
    if (keys['ArrowRight']) player.dir = 0;

    movePlayer();
    digInDirection();
    updateMonsters();
    updateBullets();
    updateEmeralds();
    updateGoldPieces();
    updateMonstersCollision();
    updateParticles();
    updateWeapon();
    checkLevelComplete();

    document.getElementById('scoreVal').textContent = score;
    document.getElementById('levelVal').textContent = level;
    document.getElementById('livesVal').textContent = lives;
  }

  function draw() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (grid[r][c] === 2) drawWall(c, r);
        else if (grid[r][c] === 1) drawTunnel(c, r);
        else if (grid[r][c] === 0) drawEarth(c, r);
      }
    }

    emeralds.forEach(drawEmerald);
    goldPieces.forEach(drawGoldBag);
    goldPieces.filter(function(g) { return !g.wobbling && !g.falling && !g.collected; }).forEach(drawGoldPiece);
    bullets.forEach(drawBullet);
    monsters.forEach(drawMonster);
    drawPlayer();
    drawParticles();

    if (gameState === 'paused') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#0ff';
      ctx.font = 'bold 36px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('PAUSED', W / 2, H / 2);
      ctx.font = '16px Courier New';
      ctx.fillStyle = '#aaa';
      ctx.fillText('Press P to resume', W / 2, H / 2 + 40);
    }
  }

  // ---- OVERLAY ----
  function showOverlay(type) {
    var overlay = document.getElementById('overlay');
    overlay.classList.remove('hidden');

    if (type === 'gameover') {
      overlay.innerHTML = '<h2>GAME OVER</h2><div class="subtitle">Final Score: <span style="color:#0ff;font-size:24px">' + score + '</span></div><button class="btn" onclick="window.__startGame()">PLAY AGAIN</button>';
    }
  }

  // ---- GAME LOOP ----
  function gameLoop() {
    try {
      update();
      draw();
    } catch(e) {
      console.error('Game loop error:', e);
    }
    animFrameId = requestAnimationFrame(gameLoop);
  }

  // ---- START GAME ----
  window.__startGame = function() {
    try {
      initAudio();
      score = 0;
      lives = 3;
      level = 1;
      frameCount = 0;
      gameState = 'playing';
      document.getElementById('overlay').classList.add('hidden');
      initLevel();
    } catch(e) {
      console.error('startGame error:', e);
    }
  };

  document.getElementById('startBtn').addEventListener('click', window.__startGame);

  // ---- INPUT ----
  document.addEventListener('keydown', function(e) {
    keys[e.key] = true;

    if (e.key === ' ' && gameState === 'playing') {
      fireBullet();
      e.preventDefault();
    }
    if (e.key === 'p' || e.key === 'P') {
      if (gameState === 'playing') gameState = 'paused';
      else if (gameState === 'paused') gameState = 'playing';
    }
    if (e.key === 'Escape') {
      gameState = 'menu';
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('overlay').innerHTML = '<h1>DIGGER</h1><div class="subtitle">Dig tunnels. Collect emeralds &amp; gold.<br>Avoid the monsters. Use your weapon wisely.</div><button class="btn" onclick="window.__startGame()">START GAME</button><div class="controls"><span>Arrow Keys</span> — Move &amp; Dig<br><span>Space</span> — Fire Weapon<br><span>P</span> — Pause &nbsp; <span>ESC</span> — Quit</div>';
    }

    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].indexOf(e.key) !== -1) {
      e.preventDefault();
    }
  });

  document.addEventListener('keyup', function(e) {
    keys[e.key] = false;
  });

  // ---- INIT ----
  gameState = 'menu';
  score = 0;
  lives = 3;
  level = 1;
  frameCount = 0;
  gameLoop();

})();
</script>
</body>
</html>
