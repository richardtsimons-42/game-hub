<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Modern Tic Tac Toe</title>
<meta name="description" content="A sleek, modern Tic Tac Toe game against AI!">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
#ui{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;justify-content:center}
.btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#e4e4e7;padding:10px 20px;border-radius:10px;font-size:14px;cursor:pointer;transition:all 0.2s}
.btn:hover,.btn.active{background:rgba(99,102,241,0.2);border-color:#818cf8}
#status{color:#e4e4e7;font-size:20px;font-weight:600;margin-bottom:20px;min-height:28px}
#board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:min(320px,85vw)}
.cell{aspect-ratio:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:min(56px,15vw);cursor:pointer;transition:all 0.2s;user-select:none;-webkit-tap-highlight-color:transparent}
.cell:hover{background:rgba(255,255,255,0.08)}
.cell.x{color:#818cf8;text-shadow:0 0 20px rgba(129,140,248,0.5)}
.cell.o{color:#f472b6;text-shadow:0 0 20px rgba(244,114,182,0.5)}
.cell.win{background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.4);animation:winPulse 0.6s ease}
@keyframes winPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.cell.disabled{pointer-events:none}
#scoreboard{display:flex;gap:24px;margin-top:24px}
.score{text-align:center}
.score .label{font-size:12px;color:#71717a;text-transform:uppercase;letter-spacing:1px}
.score .value{font-size:28px;font-weight:700;margin-top:4px}
.score.x .value{color:#818cf8}
.score.o .value{color:#f472b6}
.score.d .value{color:#e4e4e7}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(8px)}
#overlay h1{font-size:32px;color:#e4e4e7;margin-bottom:8px}
#overlay p{color:#71717a;margin-bottom:24px;font-size:16px}
#overlay button{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;padding:14px 36px;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,0.4)}
</style>
</head>
<body>
<div id="ui">
  <button class="btn active" onclick="setMode('ai')">vs AI</button>
  <button class="btn" onclick="setMode('pvp')">2 Players</button>
  <button class="btn" onclick="resetScore()">Reset Score</button>
</div>
<div id="status">Your turn (X)</div>
<div id="board"></div>
<div id="scoreboard">
  <div class="score x"><div class="label">X Wins</div><div class="value" id="xScore">0</div></div>
  <div class="score d"><div class="label">Draws</div><div class="value" id="dScore">0</div></div>
  <div class="score o"><div class="label">O Wins</div><div class="value" id="oScol">0</div></div>
</div>
<div id="overlay">
  <h1>✕ Tic Tac Toe</h1>
  <p>Modern. Sleek. Addictive.</p>
  <button onclick="startGame()">Play</button>
</div>
<script>
let board=Array(9).fill(''),current='X',mode='ai',gameOver=false;
let scores={x:0,o:0,d:0};
const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
const boardEl=document.getElementById('board'),statusEl=document.getElementById('status');
function render(){boardEl.innerHTML='';
for(let i=0;i<9;i++){let c=document.createElement('div');c.className='cell'+(board[i]==='X'?' x':board[i]==='O'?' o':'');
c.textContent=board[i];c.addEventListener('click',()=>play(i));boardEl.appendChild(c)}}
function play(i){if(board[i]||gameOver)return;
board[i]=current;current=current==='X'?'O':'X';render();
let w=checkWin();if(w){endGame(w);return}
if(board.every(c=>c)){endGame('draw');return}
if(mode==='ai'&&current==='O'&&!gameOver){setTimeout(aiMove,300)}}
function aiMove(){if(gameOver)return;
let best=-Infinity,move=0;
for(let i=0;i<9;i++){if(!board[i]){board[i]='O';let s=minimax(board,0,false);board[i]='';if(s>best){best=s;move=i}}}
board[move]='O';current='X';render();
let w=checkWin();if(w){endGame(w);return}
if(board.every(c=>c)){endGame('draw');return}}
function minimax(b,d,isMax){let w=checkWin2(b);if(w==='O')return 10-d;if(w==='X')return d-10;if(b.every(c=>c))return 0;
if(isMax){let best=-Infinity;for(let i=0;i<9;i++){if(!b[i]){b[i]='O';best=Math.max(best,minimax(b,d+1,false));b[i]=''}}return best}
else{let best=Infinity;for(let i=0;i<9;i++){if(!b[i]){b[i]='X';best=Math.min(best,minimax(b,d+1,true));b[i]=''}}return best}}
function checkWin2(b){for(let[a,bb,c]of wins){if(b[a]&&b[a]===b[bb]&&b[bb]===b[c])return b[a]}return null}
function checkWin(){for(let[a,b,c]of wins){if(board[a]&&board[a]===board[b]&&board[b]===board[c])return{winner:board[a],line:[a,b,c]}}return null}
function endGame(result){gameOver=true;
if(result==='draw'){statusEl.textContent="It's a draw!";scores.d++;document.getElementById('dScore').textContent=scores.d}
else{statusEl.textContent=result.winner+' wins!';
if(result.winner==='X'){scores.x++;document.getElementById('xScore').textContent=scores.x}
else{scores.o++;document.getElementById('oScol').textContent=scores.o}
let cells=boardEl.children;for(let i of result.line)cells[i].classList.add('win')}
for(let c of boardEl.children)c.classList.add('disabled')}
function setMode(m){mode=m;document.querySelectorAll('.btn').forEach((b,i)=>b.classList.toggle('active',i===(m==='ai'?0:1)));
resetGame()}
function resetGame(){board=Array(9).fill('');current='X';gameOver=false;statusEl.textContent='Your turn (X)';render()}
function resetScore(){scores={x:0,o:0,d:0};document.getElementById('xScore').textContent=0;document.getElementById('oScol').textContent=0;document.getElementById('dScore').textContent=0;resetGame()}
function startGame(){document.getElementById('overlay').style.display='none';resetGame()}
render();
</script>
</body>
</html>
