<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Modern Connect 4</title>
<meta name="description" content="Drop discs and connect four in this modern Connect 4!">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;touch-action:manipulation}
#topbar{display:flex;gap:16px;align-items:center;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
#status{color:#e4e4e7;font-size:18px;font-weight:600;background:rgba(255,255,255,0.06);padding:8px 20px;border-radius:10px;border:1px solid rgba(255,255,255,0.1)}
#status .x{color:#818cf8}
#status .o{color:#f472b6}
.btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#e4e4e7;padding:8px 16px;border-radius:10px;font-size:13px;cursor:pointer;transition:all 0.2s}
.btn:hover{background:rgba(99,102,241,0.2);border-color:#818cf8}
#board{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;background:rgba(30,58,138,0.3);padding:10px;border-radius:16px;border:1px solid rgba(99,102,241,0.2);box-shadow:0 0 40px rgba(30,58,138,0.3)}
.cell{width:min(56px,11vw);aspect-ratio:1;background:rgba(0,0,0,0.4);border-radius:50%;cursor:pointer;transition:all 0.15s;position:relative}
.cell:hover{background:rgba(255,255,255,0.08)}
.cell.red{background:radial-gradient(circle at 35% 35%,#f87171,#dc2626);box-shadow:0 2px 8px rgba(220,38,38,0.4)}
.cell.yellow{background:radial-gradient(circle at 35% 35%,#fbbf24,#d97706);box-shadow:0 2px 8px rgba(217,119,6,0.4)}
.cell.win{animation:winPulse 0.5s ease infinite alternate}
@keyframes winPulse{from{transform:scale(1);filter:brightness(1)}to{transform:scale(1.1);filter:brightness(1.3)}}
.cell.highlight{background:rgba(255,255,255,0.15);box-shadow:inset 0 0 12px rgba(255,255,255,0.1)}
#col-indicator{display:flex;width:min(420px,90vw);justify-content:space-around;margin-bottom:8px}
.col-dot{width:min(56px,11vw);height:8px;border-radius:4px;background:rgba(255,255,255,0.06);transition:all 0.2s}
.col-dot.active{background:rgba(99,102,241,0.5);box-shadow:0 0 12px rgba(99,102,241,0.4)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(8px)}
#overlay h1{font-size:32px;color:#e4e4e7;margin-bottom:8px}
#overlay p{color:#71717a;margin-bottom:24px;font-size:16px}
#overlay button{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;padding:14px 36px;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,0.4)}
#scoreboard{display:flex;gap:24px;margin-top:20px}
.score{text-align:center}
.score .label{font-size:12px;color:#71717a;text-transform:uppercase;letter-spacing:1px}
.score .value{font-size:28px;font-weight:700;margin-top:4px}
.score.x .value{color:#818cf8}
.score.o .value{color:#f472b6}
.score.d .value{color:#e4e4e7}
</style>
</head>
<body>
<div id="topbar">
  <div id="status">Your turn: <span class="x">Red</span></div>
  <button class="btn" onclick="resetGame()">New Game</button>
  <button class="btn" onclick="resetScore()">Reset Score</button>
</div>
<div id="col-indicator"></div>
<div id="board"></div>
<div id="scoreboard">
  <div class="score x"><div class="label">Red Wins</div><div class="value" id="xScore">0</div></div>
  <div class="score d"><div class="label">Draws</div><div class="value" id="dScore">0</div></div>
  <div class="score o"><div class="label">Yellow Wins</div><div class="value" id="oScore">0</div></div>
</div>
<div id="overlay">
  <h1>🔴 Connect 4</h1>
  <p>Drop discs. Connect four. Win!</p>
  <button onclick="startGame()">Play</button>
</div>
<script>
const ROWS=6,COLS=7,EMPTY=0,RED=1,YELLOW=2;
let board=[],current=RED,gameOver=false,hoverCol=-1;
let scores={red:0,yellow:0,draw:0};
const boardEl=document.getElementById('board'),statusEl=document.getElementById('status');
const colIndicator=document.getElementById('col-indicator');
function init(){board=Array.from({length:ROWS},()=>Array(COLS).fill(EMPTY));
boardEl.innerHTML='';colIndicator.innerHTML='';
for(let c=0;c<COLS;c++){let dot=document.createElement('div');dot.className='col-dot';colIndicator.appendChild(dot)}
for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){let cell=document.createElement('div');cell.className='cell';
cell.dataset.r=r;cell.dataset.c=c;
cell.addEventListener('click',()=>play(c));
cell.addEventListener('mouseenter',()=>{hoverCol=c;updateHighlight()});
cell.addEventListener('mouseleave',()=>{hoverCol=-1;updateHighlight()});
boardEl.appendChild(cell)}}
function updateHighlight(){document.querySelectorAll('.col-dot').forEach((d,i)=>d.classList.toggle('active',i===hoverCol));
document.querySelectorAll('.cell').forEach(c=>c.classList.remove('highlight'));
if(hoverCol>=0&&!gameOver){for(let r=0;r<ROWS;r++)if(board[r][hoverCol]===EMPTY){document.querySelectorAll(`[data-c="${hoverCol}"]`)[r]?.classList.add('highlight');break}}}
function play(col){if(gameOver)return;
let row=getRow(col);if(row<0)return;
board[row][col]=current;renderCell(row,col);
let w=checkWin(row,col,current);if(w){endGame(current,w);return}
if(board[0].every(c=>c!==EMPTY)){endGame(0);return}
current=current===RED?YELLOW:RED;updateStatus()}
function getRow(col){for(let r=ROWS-1;r>=0;r--)if(board[r][col]===EMPTY)return r;return-1}
function renderCell(r,c){let idx=r*COLS+c;let cell=boardEl.children[idx];
cell.classList.add(current===RED?'red':'yellow');
cell.style.animation='none';cell.offsetHeight;cell.style.animation=''}
function updateStatus(){if(gameOver)return;
let cls=current===RED?'x':'o',name=current===RED?'Red':'Yellow';
statusEl.innerHTML=`${current===RED?'Your':'Opponent\'s'} turn: <span class="${cls}">${name}</span>`}
function checkWin(r,c,p){let dirs=[[0,1],[1,0],[1,1],[1,-1]];
for(let[dr,dc]of dirs){let count=1;
for(let i=1;i<4;i++){let nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===p)count++}
for(let i=1;i<4;i++){let nr=r-dr*i,nc=c-dc*i;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===p)count++}
if(count>=4){let line=[];
for(let i=-3;i<=3;i++){let nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===p)line.push(nr*COLS+nc)}
return line}}return null}
function endGame(w,winLine){gameOver=true;
if(w===0){statusEl.textContent="It's a draw!";scores.draw++;document.getElementById('dScore').textContent=scores.draw}
else{let cls=w===RED?'x':'o',name=w===RED?'Red':'Yellow';
statusEl.innerHTML=`<span class="${cls}">${name}</span> wins!`;
if(w===RED){scores.red++;document.getElementById('xScore').textContent=scores.red}
else{scores.yellow++;document.getElementById('oScore').textContent=scores.yellow}
for(let i of winLine)boardEl.children[i].classList.add('win')}}
function resetGame(){for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)board[r][c]=EMPTY;
current=RED;gameOver=false;
document.querySelectorAll('.cell').forEach(c=>{c.className='cell'});
updateStatus();updateHighlight()}
function resetScore(){scores={red:0,yellow:0,draw:0};document.getElementById('xScore').textContent=0;document.getElementById('oScore').textContent=0;document.getElementById('dScore').textContent=0;resetGame()}
function startGame(){document.getElementById('overlay').style.display='none';resetGame()}
init();
</script>
</body>
</html>
