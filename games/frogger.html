<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Modern Frogger</title>
<meta name="description" content="Cross the road and river in this modern Frogger clone!">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;touch-action:none}
#ui{display:flex;gap:24px;margin-bottom:12px;align-items:center}
.stat{color:#e4e4e7;font-size:16px;font-weight:600;background:rgba(255,255,255,0.06);padding:6px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1)}
.stat span{color:#818cf8}
canvas{border-radius:12px;box-shadow:0 0 40px rgba(99,102,241,0.2)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(8px)}
#overlay h1{font-size:36px;color:#e4e4e7;margin-bottom:8px}
#overlay p{color:#71717a;margin-bottom:24px;font-size:16px}
#overlay button{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;padding:14px 36px;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,0.4);transition:transform 0.2s}
#overlay button:hover{transform:scale(1.05)}
#mobile-controls{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);gap:8px;z-index:5}
.ctrl-btn{width:60px;height:60px;border-radius:14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#e4e4e7;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.ctrl-btn:active{background:rgba(99,102,241,0.3)}
#dpad{display:grid;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(2,60px);gap:4px}
#dpad .ctrl-btn:nth-child(1){grid-column:2;grid-row:1}
#dpad .ctrl-btn:nth-child(2){grid-column:1;grid-row:2}
#dpad .ctrl-btn:nth-child(3){grid-column:2;grid-row:2}
#dpad .ctrl-btn:nth-child(4){grid-column:3;grid-row:2}
@media(max-width:600px){#mobile-controls{display:flex}canvas{max-width:95vw}}
</style>
</head>
<body>
<div id="ui">
  <div class="stat">Score: <span id="score">0</span></div>
  <div class="stat">Lives: <span id="lives">3</span></div>
  <div class="stat">Level: <span id="level">1</span></div>
</div>
<canvas id="game"></canvas>
<div id="overlay">
  <h1>🐸 Frogger</h1>
  <p>Cross roads and rivers to reach home!</p>
  <button onclick="startGame()">Play</button>
</div>
<div id="mobile-controls">
  <div id="dpad">
    <div class="ctrl-btn" ontouchstart="move(0,-1)" onclick="move(0,-1)">▲</div>
    <div class="ctrl-btn" ontouchstart="move(-1,0)" onclick="move(-1,0)">◀</div>
    <div class="ctrl-btn" ontouchstart="move(0,1)" onclick="move(0,1)">▼</div>
    <div class="ctrl-btn" ontouchstart="move(1,0)" onclick="move(1,0)">▶</div>
  </div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const COLS=11,ROWS=13,CELL=48;
canvas.width=COLS*CELL;canvas.height=ROWS*CELL;
let score=0,lives=3,level=1,gameRunning=false,player,frogs=[];
let lanes=[],homeSlots=[];
const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true;e.preventDefault()});
window.addEventListener('keyup',e=>keys[e.key]=false);
function move(dx,dy){if(!gameRunning)return;
let nx=player.x+dx,ny=player.y+dy;
if(nx<0||nx>=COLS||ny<0||ny>=ROWS)return;
if(ny<=2&&homeSlots[ny].includes(nx)){homeSlots[ny].remove(nx);score+=100*level;player={x:nx,y:ny};checkWin();return}
player.x=nx;player.y=ny;
if(ny===0||ny===1||ny===2){let h=homeSlots[ny];if(!h.has(nx)){h.add(nx);score+=100*level;player={x:nx,y:ny};checkWin()}}}
function checkWin(){if(homeSlots[0].size+homeSlots[1].size+homeSlots[2].size>=5){level++;score+=500*level;initLanes();player={x:Math.floor(COLS/2),y:ROWS-1};homeSlots=[new Set(),new Set(),new Set()];updateUI()}}
function initLanes(){
lanes=[];
for(let r=0;r<3;r++)lanes.push({type:'home',speed:0});
for(let r=3;r<7;r++){
let speed=(r%2===0?1:-1)*(0.8+level*0.3);
let count=3+Math.floor(level/2);
let cars=[];for(let i=0;i<count;i++)cars.push({x:i*(COLS/count),w:1.5,color:['#ef4444','#f59e0b','#3b82f6','#22c55e'][i%4]});
lanes.push({type:'road',speed,cars})}
for(let r=7;r<10;r++){
let speed=(r%2===0?1:-1)*(1.0+level*0.25);
let count=2+Math.floor(level/2);
let logs=[];for(let i=0;i<count;i++)logs.push({x:i*(COLS/count),w:2.5+Math.random(),color:['#92400e','#78350f','#a16207'][i%3]});
lanes.push({type:'water',logs,safe:false})}
for(let r=10;r<13;r++){
let speed=(r%2===0?1:-1)*(1.2+level*0.2);
let count=2+Math.floor(level/2);
let logs=[];for(let i=0;i<count;i++)logs.push({x:i*(COLS/count),w:2.5+Math.random(),color:['#92400e','#78350f','#a16207'][i%3]});
lanes.push({type:'water',logs,safe:true})}
homeSlots=[new Set(),new Set(),new Set()]}
function startGame(){score=0;lives=3;level=1;player={x:Math.floor(COLS/2),y:ROWS-1};initLanes();document.getElementById('overlay').style.display='none';gameRunning=true;updateUI();loop()}
function updateUI(){document.getElementById('score').textContent=score;document.getElementById('lives').textContent=lives;document.getElementById('level').textContent=level}
function die(){lives--;updateUI();if(lives<=0){gameRunning=false;document.getElementById('overlay').innerHTML=`<h1>Game Over</h1><p>Score: ${score}</p><button onclick="startGame()">Play Again</button>`;document.getElementById('overlay').style.display='flex';return}
player={x:Math.floor(COLS/2),y:ROWS-1};homeSlots=[new Set(),new Set(),new Set()]}
function loop(){if(!gameRunning)return;
ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,canvas.width,canvas.height);
// Draw lanes
for(let r=0;r<ROWS;r++){
let y=r*CELL;
if(r<3){ctx.fillStyle=r%2===0?'#1a1a2e':'#16162a';ctx.fillRect(0,y,canvas.width,CELL);
if(r<3){for(let c=0;c<COLS;c++){let inHome=homeSlots[r].has(c);ctx.fillStyle=inHome?'rgba(34,197,94,0.3)':'rgba(255,255,255,0.03)';ctx.fillRect(c*CELL+2,y+2,CELL-4,CELL-4)}}}
else if(r<7){ctx.fillStyle='#1a1a2e';ctx.fillRect(0,y,canvas.width,CELL);
ctx.fillStyle='#2a2a3e';for(let c=0;c<COLS;c++)ctx.fillRect(c*CELL+CELL/2-1,y,2,CELL);
let lane=lanes[r-3];if(lane.type==='road'){for(let car of lane.cars){let cx=(car.x+lane.speed*Date.now()/1000)%COLS;if(cx<-2)cx+=COLS+2;ctx.fillStyle=car.color;ctx.beginPath();ctx.roundRect(cx*CELL+4,y+6,(car.w)*CELL-8,CELL-12,6);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(cx*CELL+8,y+10,CELL*car.w-20,8)}}}
else{ctx.fillStyle=r<10?'#0c1a3a':'#0a1628';ctx.fillRect(0,y,canvas.width,CELL);
let lane=lanes[r-7];if(lane.type==='water'){for(let log of lane.logs){let lx=(log.x+lane.speed*Date.now()/1000)%COLS;if(lx<-3)lx+=COLS+3;ctx.fillStyle=log.color;ctx.beginPath();ctx.roundRect(lx*CELL,y+8,log.w*CELL-4,CELL-16,8);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(lx*CELL+4,y+12,log.w*CELL-12,4)}}}}
// Draw player
if(gameRunning){
let px=player.x*CELL+CELL/2,py=player.y*CELL+CELL/2;
ctx.fillStyle='#22c55e';ctx.beginPath();ctx.arc(px,py,CELL/2-4,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#16a34a';ctx.beginPath();ctx.arc(px,py,CELL/2-8,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px-6,py-4,4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(px+6,py-4,4,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#000';ctx.beginPath();ctx.arc(px-5,py-4,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(px+7,py-4,2,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#000';ctx.beginPath();ctx.arc(px,py+4,5,0,Math.PI);ctx.stroke()}
// Check collisions
if(player.y>=3&&player.y<10){
let row=player.y-3;let lane=lanes[row];
if(lane.type==='road'){for(let car of lane.cars){let cx=(car.x+lane.speed*Date.now()/1000)%COLS;if(cx<-2)cx+=COLS+2;
if(player.x>=cx-0.5&&player.x<cx+car.w-0.5){die();return}}}
if(lane.type==='water'){let onLog=false;for(let log of lane.logs){let lx=(log.x+lane.speed*Date.now()/1000)%COLS;if(lx<-3)lx+=COLS+3;
if(player.x>=lx-0.3&&player.x<lx+log.w-0.3){onLog=true;player.x=lx+log.w/2-0.5;if(player.x<0||player.x>=COLS){die();return}}
if(!onLog&&lane.safe){die();return}}}}
// Keyboard
if(keys['ArrowUp']||keys['w']){move(0,-1);keys['ArrowUp']=keys['w']=false}
if(keys['ArrowDown']||keys['s']){move(0,1);keys['ArrowDown']=keys['s']=false}
if(keys['ArrowLeft']||keys['a']){move(-1,0);keys['ArrowLeft']=keys['a']=false}
if(keys['ArrowRight']||keys['d']){move(1,0);keys['ArrowRight']=keys['d']=false}
requestAnimationFrame(loop)}
initLanes();player={x:Math.floor(COLS/2),y:ROWS-1};
</script>
</body>
</html>
